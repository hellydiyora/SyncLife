<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&amp;display=swap');
    .bg {
      fill: #7E8F7A;
      transition: fill 0.3s ease;
    }
    .text-s {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-weight: 600;
      fill: #FAF8F5;
    }
    .text-l {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-weight: 400;
      font-style: italic;
      fill: #FAF8F5;
    }
    .leaf {
      fill: #C38A72; /* Terracotta accent leaf */
      transition: fill 0.3s ease;
    }
    @media (prefers-color-scheme: dark) {
      .bg {
        fill: #2A2724; /* Cozy dark brown/charcoal matching midnight dark theme */
      }
      .text-s {
        fill: #FAF8F5;
      }
      .text-l {
        fill: #93A68F; /* Sage green for L in dark mode */
      }
      .leaf {
        fill: #DCA086; /* Dark mode terracotta */
      }
    }
  </style>
  <rect width="512" height="512" rx="140" class="bg" />
  
  <!-- "S" from Sync -->
  <text x="35%" y="65%" font-size="240" text-anchor="middle" class="text-s">S</text>
  
  <!-- "L" from Life (italicized) -->
  <text x="63%" y="65%" font-size="240" text-anchor="middle" class="text-l">L</text>
  
  <!-- Stylized leaf accent in the upper right -->
  <path d="M 370,120 C 410,90 450,110 460,150 C 420,180 390,170 370,120 Z" class="leaf" />
  <path d="M 370,120 Q 390,140 420,150" stroke="#FAF8F5" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />
</svg>
